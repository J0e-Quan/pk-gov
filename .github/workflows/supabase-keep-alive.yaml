name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 UTC every Sunday (0) and Thursday (4)
    - cron: '0 0 * * 0,4'
  workflow_dispatch: # Enables running it manually from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/your_table_name?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
